name: "Display Hub Client"
description: "Client for HA Display Hub"
slug: "displayhub_client"
version: "0.1.0"
init: false
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386
startup: services
boot: auto
hassio_api: true
homeassistant_api: true
hassio_role: homeassistant
options:
  displayhub_host: "192.168.88.108"
  displayhub_port: 4510
  lcd_width: 16
  lcd_height: 2
  rotation_seconds: 5
  refresh_seconds: 2
  debug: false

- display: rack1
  layout: value
  name: Exterior
  entity: sensor.alfa_clima_outside_temperature
  decimals: 1
  scroll: true

- display: rack2
  layout: percent_bar
  name: Cisterna
  entity: sensor.nivel_cisterna
  decimals: 0
  bar_min: "0"
  bar_max: "100"

- display: rack1
  layout: dual_value
  name: Clima
  entity: sensor.alfa_clima_outside_temperature
  entity2: sensor.alfa_clima_humidity
  decimals: 1

schema:
  displayhub_host: str
  displayhub_port: port
  lcd_width: int
  lcd_height: int
  rotation_seconds: int
  refresh_seconds: int
  debug: bool
screens:
  - name: str
    display: str
    layout: str?
    widget: str?
    entity: str
    entity2: str?
    decimals: int?
    unit: str?
    progressbar: bool?
    bar_style: str?
    bar_min: str?
    bar_max: str?
    scroll: bool?
